<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="div1">
        <h1>Wheather App</h1>
        <input id="name" autocomplete="off" type="text" placeholder="Enter a city Name">
        <button id="button" >Search</button>
        <br><br>
        <div id="div2">
            <h2>Condition: </h2> <h2 class="answer" id="condition"></h2>
            <br><br>
            <h2>Temp: </h2><h2 id="temp" class="answer"></h2>
            <br><br>
            <h2>Air Quality: </h2> <h2 id="airquality" class="answer"></h2>
            <br><br>
            <h2>Humidity: </h2> <h2 class="answer" id="humidity"></h2>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
