<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Rock Paper Scissors</h1>
        <br>
        <div id="maindiv">
            <div id="buttoncontainer">
            <div class="play">
                <button class="button" id="rock">👊</button>
            </div>
            <div class="play">
                <button class="button" id="paper">🤚</button>
            </div>
            <div class="play">
                <button class="button" id="scissor">✌️</button>
            </div>
            </div>
            <h2 >Player: </h2><h2 id="player"></h2>
            <br>
            <h2 >Computer: </h2><h2 id="computer"></h2>
            <br>
            <h2 id="result"></h2>
            <br>
            <h3>Player Score: </h3><h3 class="score" id="pscore">0</h3><br>
            <h3>Computer Score: </h3><h3 class="score" id="cscore">0</h3>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
